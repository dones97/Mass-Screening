name: Monthly Stock Screening

on:
  schedule:
    # Runs on the 1st of every month at 3:00 AM UTC
    - cron: '0 3 1 * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  run-screener:
    name: Run Screening Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout all three repositories side-by-side
      - name: Checkout Mass Screening repo
        uses: actions/checkout@v4

      - name: Checkout factoranalysis repo
        uses: actions/checkout@v4
        with:
          repository: dones97/factoranalysis
          path: factoranalysis

      - name: Checkout valuation repo
        uses: actions/checkout@v4
        with:
          repository: dones97/valuation
          path: Valuation

      # 2. Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies for all three projects
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r factoranalysis/requirements.txt
          pip install -r Valuation/requirements.txt

      # 4. Run the screening pipeline
      - name: Run screener
        run: python run_screener.py

      # 5. Commit and push updated screened_stocks.json back to Mass Screening repo
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screened_stocks.json
          git diff-index --quiet HEAD || (git commit -m "Automated Monthly Stock Screening Update [skip ci]" && git push)
